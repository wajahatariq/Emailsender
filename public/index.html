<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowmotive Agent Dashboard</title>
    <style>
        :root {
            --primary: #2A004D;
            --primary-hover: #3b006b;
            --bg: #f4f6f8;
            --card-bg: #ffffff;
            --text: #333333;
            --border: #e0e4e8;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            padding: 40px 20px; 
            margin: 0;
        }

        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); 
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
        }

        .header img {
            width: 50px;
            height: auto;
        }

        h1 { 
            color: var(--primary); 
            margin: 0;
            font-size: 28px;
            letter-spacing: -0.5px;
        }

        .form-group { 
            margin-bottom: 25px; 
        }

        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 10px; 
            color: #111;
        }

        textarea, input[type="file"] { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid var(--border); 
            border-radius: 8px; 
            font-family: inherit; 
            box-sizing: border-box;
            transition: border-color 0.2s;
            font-size: 14px;
        }

        textarea:focus, input[type="file"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea { 
            height: 160px; 
            resize: vertical;
        }

        button { 
            background-color: var(--primary); 
            color: #fff; 
            border: none; 
            padding: 16px 28px; 
            font-size: 16px; 
            font-weight: 600;
            border-radius: 8px; 
            cursor: pointer; 
            transition: background-color 0.2s ease, transform 0.1s ease;
            width: 100%;
        }

        button:hover { 
            background-color: var(--primary-hover); 
        }
        
        button:active {
            transform: scale(0.98);
        }

        .status-board {
            margin-top: 35px;
            padding: 25px;
            background-color: #fafbfc;
            border-radius: 10px;
            border-left: 5px solid var(--primary);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .status-board h3 {
            margin-top: 0;
            color: var(--primary);
            font-size: 18px;
        }

        .stats-grid {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-num {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
            display: block;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .next-up {
            margin-top: 20px;
            font-size: 14px;
            color: #444;
            background: white;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .note { 
            font-size: 0.85em; 
            color: #666; 
            margin-top: 8px; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="/flowmotive.png" alt="Flowmotive Logo">
        <h1>Flowmotive Automated Agent</h1>
    </div>
    
    <div class="form-group">
        <label for="fileUpload">Upload Leads File (.csv, .xlsx)</label>
        <input type="file" id="fileUpload" accept=".csv, .xlsx">
        <div class="note">The system prioritizes leads where <strong>website_has_google_tag</strong> is True.</div>
    </div>

    <div class="form-group">
        <label for="emailTemplate">AI Prompt / Email Framework</label>
        <div class="note">Use column names in brackets like {name} or {city} to inject data.</div>
        <textarea id="emailTemplate" placeholder="Hi {name}, I noticed your website {website} might need some help..."></textarea>
    </div>

    <button onclick="startCampaign()" id="submitBtn">Load Queue & Start Pacer</button>

    <div class="status-board">
        <h3>Live Queue Tracker</h3>
        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-num" id="sentCount">0</span>
                <span class="stat-label">Total Sent</span>
            </div>
            <div class="stat-box">
                <span class="stat-num" id="pendingCount">0</span>
                <span class="stat-label">Pending</span>
            </div>
        </div>
        <div class="next-up" id="nextLead">Next in queue: <strong>Loading...</strong></div>
    </div>
</div>

<script>
    async function startCampaign() {
        const fileInput = document.getElementById('fileUpload');
        const templateInput = document.getElementById('emailTemplate').value;
        const submitBtn = document.getElementById('submitBtn');

        if (!fileInput.files[0] || !templateInput.trim()) {
            alert("Please provide both a lead file and an email template.");
            return;
        }

        submitBtn.innerText = "Uploading to Database...";
        submitBtn.disabled = true;

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("template", templateInput);

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            
            if (response.ok) {
                alert(result.message);
                fileInput.value = "";
                fetchQueueStatus(); 
            } else {
                alert("Upload Error: " + (result.detail || "Unknown server error."));
            }
        } catch (error) {
            alert("Network Error: Could not reach the backend API.");
        } finally {
            submitBtn.innerText = "Load Queue & Start Pacer";
            submitBtn.disabled = false;
        }
    }

    async function fetchQueueStatus() {
        try {
            const response = await fetch('/api/status');
            if (response.ok) {
                const data = await response.json();
                document.getElementById('sentCount').innerText = data.sent;
                document.getElementById('pendingCount').innerText = data.pending;
                
                const nextLeadEl = document.getElementById('nextLead');
                if (data.next_email) {
                    nextLeadEl.innerHTML = `Next in queue: <strong>${data.next_email}</strong>`;
                } else {
                    nextLeadEl.innerHTML = `Next in queue: <strong style="color: #666;">None (Queue Empty)</strong>`;
                }
            }
        } catch (error) {
            console.error("Tracker sync failed:", error);
        }
    }

    fetchQueueStatus();
    setInterval(fetchQueueStatus, 5000);
</script>

</body>
</html>
